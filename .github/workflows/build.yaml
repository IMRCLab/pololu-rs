name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted
    container: rust:1.87
    strategy:
      matrix:
        feature: ["", "zumo", "three-pi"]   # "" = 默认 (v0)
    steps:
      - uses: actions/checkout@v3

      - name: Install toolchain
        run: |
          rustup target add thumbv6m-none-eabi
          cargo install flip-link

      - name: Build library
        run: |
          if [ -z "${{ matrix.feature }}" ]; then
            cargo build --release --target thumbv6m-none-eabi
          else
            cargo build --release --target thumbv6m-none-eabi --features ${{ matrix.feature }}
          fi

      - name: Run Linter
        run: |
          rustup component add clippy
          if [ -z "${{ matrix.feature }}" ]; then
            cargo clippy --all-targets --target thumbv6m-none-eabi
          else
            cargo clippy --all-targets --target thumbv6m-none-eabi --features ${{ matrix.feature }}
          fi

      - name: Run Code Formatter
        run: |
          rustup component add rustfmt
          cargo fmt --all --check
