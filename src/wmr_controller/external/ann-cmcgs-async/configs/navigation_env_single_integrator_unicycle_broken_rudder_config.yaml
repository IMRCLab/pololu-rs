# Default planner to use if not specified
default_planner: "MCGS"

experiment:
  render_mode: "ansi"
  save_replay: true
  computational_budget_max: 150  # Increased budget for broken rudder complexity
  time_budget_max: 30.0  # More time needed for constrained navigation
  sleep_time: 0.1
  max_steps: 50  # More steps potentially needed
  num_episodes: 10

environment:
  name: "NavigationEnvSingleIntegratorBrokenRudder-v0"
  # Environment parameters
  dt: 1.0
  atol: 0.3
  rtol: 0.0
  multi_step_count: 5
  obstacle_mode: "circles"
  render_sleep: 0.0
  plan_in_space_time: true
  default_step_divisor: 10
  sparse_reward: true

planners:
  MCGS:
    config:
      expand_n_times: 5  # Increased for broken rudder complexity
      expand_n_times_min: 5  # Higher minimum for complex scenario
      expand_n_times_max: 5  # Higher maximum for complex scenario
      sample_best_X_actions: 10
      kappa: 0.8
      alpha: 0.75
      k: 7  # Increased for more exploration due to constrained dynamics
      radius_threshold: 3.0
      progressive_widening_method: "default"
      epsilon: 0.1
      abstraction_refinement_exponent: -0.5
      c_uct: 0.6  # Slightly higher exploration for constrained system
      plan_in_space_time: true
      use_controller: true
      tracking_tolerance: 0.2  # More tolerant due to broken rudder constraints
      yield_mode: 'N'
      random_rollout_n_times: 1  # More rollouts needed for asymmetric dynamics
      random_rollout_length: 4
      force_exact_update: true
  CMCGS:
    config:
      alpha: 9
      beta: 9
      clustering_alg: agglomerative
      elite_ratio: 0.07040656196183302
      max_n_clusters: 2147483646
      min_graph_length: 3
      min_update_divisor: 1.6682867370346308
      optimal_n_top: 11
      optimal_prob: 0.2729210533224613
      optimal_range: 0.7873178351184197
      rollout_length: 4