# Default planner to use if not specified
default_planner: "MCGS"

experiment:
  render_mode: "ansi"
  save_replay: true
  computational_budget_max: 200
  time_budget_max: 20.0
  sleep_time: 0.1
  max_steps: 40
  num_episodes: 10

environment:
  name: "NavigationEnvSingleIntegrator-v0"
  # Environment parameters
  dt: 1.0
  atol: 0.3
  rtol: 0.0
  multi_step_count: 5
  obstacle_mode: "circles"
  render_sleep: 0.0
  plan_in_space_time: false
  default_step_divisor: 10
  sparse_reward: true

planners:
  MCGS:
    config:
      expand_n_times: 2
      expand_n_times_min: 2
      expand_n_times_max: 5
      sample_best_X_actions: 10
      kappa: 0.75
      alpha: 0.8
      k: 5
      radius_threshold: 2.0
      progressive_widening_method: "default"
      epsilon: 0.1
      abstraction_refinement_exponent: -0.5
      c_uct: 0.5
      plan_in_space_time: true
      use_controller: true
      tracking_tolerance: 0.2
      yield_mode: 'N'
      random_rollout_n_times: 1
      random_rollout_length: 3
      force_exact_update: true
  CMCGS:
    config:
      alpha: 5
      beta: 4
      clustering_alg: agglomerative
      elite_ratio: 0.23123070046890368
      max_n_clusters: 2147483646
      min_graph_length: 2
      min_update_divisor: 0.5664754021831858
      optimal_n_top: 8
      optimal_prob: 0.15922080798352756
      optimal_range: 0.14783321326920357
      rollout_length: 3
  MCTS_Bootstrap:
    config:
      expand_n_times: 2
      expand_n_times_min: 2
      expand_n_times_max: 5
      kappa: 0.6
      alpha: 0.8
      k: 0
      radius_threshold: 0.3
      progressive_widening_method: "default"
      abstraction_refinement_exponent: -0.0
      c_uct: 0.6
      plan_in_space_time: true
      use_controller: true
      tracking_tolerance: 0.9
