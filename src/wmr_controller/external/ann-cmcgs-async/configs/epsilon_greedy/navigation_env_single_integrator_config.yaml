# Default planner to use if not specified
default_planner: "MCGS"

experiment:
  render_mode: "ansi"
  save_replay: true
  computational_budget_max: 50
  time_budget_max: 20.0
  sleep_time: 0.1
  max_steps: 50
  num_episodes: 15

environment:
  name: "NavigationEnvSingleIntegrator-v0"
  # Environment parameters
  dt: 1.0
  atol: 0.3
  rtol: 0.0
  multi_step_count: 5
  obstacle_mode: "circles"
  render_sleep: 0.0
  plan_in_space_time: false
  default_step_divisor: 1
  sparse_reward: true

planners:
  MCGS:
    config:
      expand_n_times: 1
      expand_n_times_min: 1
      expand_n_times_max: 1
      sample_best_X_actions: 10
      kappa: 1.0
      alpha: 0.1
      gamma: 0.99
      k: 50
      radius_threshold: 0.4
      progressive_widening_method: "epsilon_greedy"
      epsilon: 0.1
      abstraction_refinement_exponent: -0.0
      c_uct: 0.5
      plan_in_space_time: false
      use_controller: true
      tracking_tolerance: 0.1
      yield_mode: 'N'
      random_rollout_n_times: 1
      random_rollout_length: 3
      force_exact_update: false
  CMCGS:
    config:
      alpha: 5
      beta: 4
      clustering_alg: agglomerative
      elite_ratio: 0.23123070046890368
      max_n_clusters: 2147483646
      min_graph_length: 2
      min_update_divisor: 0.5664754021831858
      optimal_n_top: 8
      optimal_prob: 0.15922080798352756
      optimal_range: 0.14783321326920357
      rollout_length: 3
  MCTS_Bootstrap:
    config:
      expand_n_times: 1
      expand_n_times_min: 1
      expand_n_times_max: 1
      sample_best_X_actions: 10
      kappa: 1.0
      alpha: 0.1
      gamma: 0.99
      k: 0
      radius_threshold: 0.0
      progressive_widening_method: "epsilon_greedy"
      epsilon: 0.1
      abstraction_refinement_exponent: -0.0
      c_uct: 0.5
      plan_in_space_time: false
      use_controller: true
      tracking_tolerance: 0.1
      yield_mode: 'N'
      random_rollout_n_times: 1
      random_rollout_length: 3
      force_exact_update: false